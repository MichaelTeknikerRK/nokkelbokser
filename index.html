<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nøkkelbokser – Rana kommune</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1a56a0;--blue-dark:#0f3d7a;--blue-light:#e8f0fb;
  --red:#b03030;--red-light:#fbeaea;
  --gray-50:#f7f7f7;--gray-100:#ebebeb;--gray-300:#c0c0c0;
  --gray-500:#888;--gray-700:#444;--gray-900:#1a1a1a;
  --white:#fff;--shadow:0 2px 12px rgba(0,0,0,0.12);
  --radius:10px;--font:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--gray-50);color:var(--gray-900);}

header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--blue);height:56px;display:flex;align-items:center;padding:0 16px;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.header-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-logo svg{width:18px;height:18px;}
header h1{color:#fff;font-size:16px;font-weight:600;flex:1;}
.header-count{background:rgba(255,255,255,0.2);color:#fff;font-size:12px;padding:3px 10px;border-radius:20px;}

.top-controls{position:fixed;top:56px;left:0;right:0;z-index:900;background:var(--white);border-bottom:1px solid var(--gray-100);padding:10px 12px 8px;}
.search-wrap{position:relative;margin-bottom:8px;}
.search-wrap input{width:100%;padding:10px 36px 10px 38px;border:1.5px solid var(--gray-100);border-radius:var(--radius);background:var(--gray-50);font-family:var(--font);font-size:14px;color:var(--gray-900);outline:none;transition:border-color 0.15s;}
.search-wrap input:focus{border-color:var(--blue);background:#fff;}
.search-wrap input::placeholder{color:var(--gray-500);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray-500);}
.search-icon svg{width:16px;height:16px;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--gray-300);border:none;cursor:pointer;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;}
.search-clear.visible{display:flex;}
.search-clear svg{width:10px;height:10px;stroke:#fff;stroke-width:3;}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:none;z-index:200;}
.search-results.visible{display:block;}
.sri{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:10px;}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--blue-light);}
.sri-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sri-addr{font-weight:500;font-size:13px;}
.sri-sub{font-size:11px;color:var(--gray-500);margin-top:1px;}

.filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-100);background:var(--white);color:var(--gray-700);white-space:nowrap;font-family:var(--font);flex-shrink:0;transition:all 0.15s;}
.fchip.active{color:#fff;border-color:transparent;}
.fchip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

#map{position:fixed;left:0;right:0;bottom:64px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:var(--white);border-top:1px solid var(--gray-100);height:64px;display:flex;box-shadow:0 -2px 8px rgba(0,0,0,0.08);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:500;color:var(--gray-500);}
.nav-btn.active{color:var(--blue);}
.nav-btn svg{width:22px;height:22px;}
.add-btn-inner{width:48px;height:48px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(26,86,160,0.4);margin-bottom:2px;}
.add-btn-inner svg{width:24px;height:24px;}

.leaflet-popup-content-wrapper{border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.15);border:none;padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0;width:280px!important;}
.leaflet-popup-tip-container{display:none;}
.popup-img{width:100%;height:150px;object-fit:cover;display:block;cursor:pointer;}
.popup-body{padding:14px;}
.popup-addr{font-size:16px;font-weight:600;color:var(--gray-900);margin-bottom:10px;line-height:1.3;}
.popup-field{margin-bottom:8px;}
.popup-field-label{font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.popup-field-val{font-size:13px;color:var(--gray-700);line-height:1.4;}
.popup-footer{padding-top:8px;margin-top:8px;border-top:1px solid var(--gray-100);}
.popup-avd-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--font);}
.popup-footer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}.popup-avd-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--font);}.popup-meta-name{font-size:12px;color:var(--gray-700);font-weight:500;}.popup-meta-date{font-size:11px;color:var(--gray-300);}.img-fullscreen{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;cursor:pointer;}.img-fullscreen.visible{display:flex;}.img-fullscreen img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px;}

#liste-view{display:none;position:fixed;left:0;right:0;bottom:64px;background:var(--gray-50);overflow-y:auto;z-index:700;}
.liste-search-wrap{padding:10px 12px;position:sticky;top:0;background:var(--gray-50);z-index:10;}
.liste-search-wrap input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-100);border-radius:var(--radius);font-family:var(--font);font-size:14px;background:var(--white);outline:none;}
.liste-search-wrap input:focus{border-color:var(--blue);}
.liste-inner{padding:0 12px 12px;}

.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:540px;padding:20px 20px 36px;transform:translateY(30px);transition:transform 0.2s;max-height:92vh;overflow-y:auto;}
.modal-overlay.visible .modal{transform:translateY(0);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:600;}
.modal-close{background:var(--gray-100);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.modal-close svg{width:16px;height:16px;}
.form-group{margin-bottom:16px;position:relative;}
.form-label{font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:6px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:0.04em;}
.opt{font-size:10px;color:var(--gray-300);text-transform:none;font-weight:400;}
.req{color:var(--red);}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-100);border-radius:8px;font-family:var(--font);font-size:14px;color:var(--gray-900);background:var(--gray-50);outline:none;transition:border-color 0.15s;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--blue);background:#fff;}
.form-group textarea{height:80px;resize:none;}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border-radius:8px;box-shadow:var(--shadow);z-index:300;overflow:hidden;display:none;}
.ac-list.visible{display:block;}
.ac-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--gray-100);display:flex;align-items:flex-start;gap:8px;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:var(--blue-light);}
.ac-item svg{width:14px;height:14px;color:var(--blue);flex-shrink:0;margin-top:2px;}
.ac-main{font-weight:500;}
.ac-sub{font-size:11px;color:var(--gray-500);}
.addr-selected{font-size:11px;color:var(--green,#2d7a3a);margin-top:4px;display:none;}
.addr-selected.visible{display:block;}
.pos-btn{width:100%;padding:10px 12px;background:var(--blue-light);color:var(--blue);border:1.5px solid var(--blue);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.pos-btn svg{width:16px;height:16px;}
.bilde-area{border:1.5px dashed var(--gray-300);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.bilde-area:hover{border-color:var(--blue);}
.bilde-placeholder{padding:20px;text-align:center;}
.bilde-placeholder svg{width:28px;height:28px;color:var(--gray-300);display:block;margin:0 auto 8px;}
.bilde-placeholder p{font-size:12px;color:var(--gray-500);}
.bilde-placeholder span{font-size:11px;color:var(--gray-300);}
.bilde-preview-img{width:100%;height:160px;object-fit:cover;display:none;}
.bilde-area input{display:none;}
.submit-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:4px;}
.submit-btn:disabled{background:var(--gray-300);cursor:not-allowed;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:3000;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;text-align:center;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--gray-100);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:13px;color:var(--gray-500);}
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
  </div>
  <h1>Nøkkelbokser</h1>
  <div class="header-count" id="count-badge">Laster...</div>
</header>

<div class="top-controls" id="top-controls">
  <div class="search-wrap">
    <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input type="text" id="search-input" placeholder="Søk adresse eller sted..." autocomplete="off"/>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="search-results" id="search-results"></div>
  </div>
  <div class="filter-row" id="filter-row"></div>
</div>

<div id="map"></div>

<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <p>Henter nøkkelbokser...</p>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-kart" onclick="setView('kart')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><line x1="9" y1="4" x2="9" y2="20"/><line x1="15" y1="7" x2="15" y2="20"/></svg>
    Kart
  </button>
  <button class="nav-btn" onclick="openModal()">
    <div class="add-btn-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    Legg til
  </button>
  <button class="nav-btn" id="nav-liste" onclick="setView('liste')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Liste
  </button>
</div>

<div id="liste-view">
  <div class="liste-search-wrap">
    <input type="text" id="liste-search-input" placeholder="Søk i listen..." oninput="filterListe(this.value)"/>
  </div>
  <div class="liste-inner" id="liste-content"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Registrer nøkkelboks</div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="form-group">
      <div class="form-label">Ditt navn <span class="req">*</span></div>
      <input type="text" id="f-navn" placeholder="F.eks. Kari Nordmann"/>
    </div>

    <div class="form-group">
      <div class="form-label">Adresse <span class="req">*</span></div>
      <input type="text" id="f-adresse" placeholder="Søk etter adresse..." autocomplete="off" oninput="adresseAC(this.value)"/>
      <div class="ac-list" id="ac-list"></div>
      <div class="addr-selected" id="addr-selected">✓ Adresse valgt</div>
      <button class="pos-btn" onclick="useGPS()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg>
        Bruk min posisjon
      </button>
    </div>

    <div class="form-group">
      <div class="form-label">Avdeling <span class="req">*</span></div>
      <select id="f-avdeling">
        <option value="">Velg avdeling...</option>
        <option>Demenslaget</option><option>Nattpatruljen</option><option>Nord</option>
        <option>Sentrum 3</option><option>Sør</option><option>Vest 1</option>
        <option>Vest 3</option><option>Øst 1</option><option>Innsatsteamet</option><option>Annet</option>
      </select>
    </div>

    <div class="form-group">
      <div class="form-label">Beskrivelse <span class="req">*</span></div>
      <textarea id="f-beskrivelse" placeholder="Beskriv nøyaktig hvor nøkkelboksen er plassert, f.eks. ved hovedinngang, veggen til venstre"></textarea>
    </div>

    <div class="form-group">
      <div class="form-label">Merknader <span class="opt">(valgfritt)</span></div>
      <input type="text" id="f-merknader" placeholder="F.eks. 1 nøkkel for hovedinngang"/>
    </div>

    <div class="form-group">
      <div class="form-label">Bilde <span class="opt">(valgfritt)</span></div>
      <div class="bilde-area" onclick="document.getElementById('f-bilde').click()">
        <div class="bilde-placeholder" id="bilde-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Ta bilde eller velg fra galleri</p>
          <span>Vises i popup og liste</span>
        </div>
        <img id="bilde-preview-img" class="bilde-preview-img"/>
        <input type="file" id="f-bilde" accept="image/*" capture="environment" onchange="previewBilde(this)"/>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">Registrer nøkkelboks</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SB_URL='https://jemhrbhzecdbnylnzdej.supabase.co';
const SB_KEY='sb_publishable_RAIOxsbMw1cmsqIVkygv2g_AKYl1zMF';
const SB_TABLE='nokkelbokser';
const SB_BUCKET='bilder';

const AVD_COLORS={
  'Demenslaget':'#7F77DD','Nattpatruljen':'#1D9E75','Nord':'#378ADD',
  'Sentrum 3':'#D85A30','Sør':'#639922','Vest 1':'#BA7517',
  'Vest 3':'#D4537E','Øst 1':'#533AB7','Innsatsteamet':'#185FA5','Annet':'#888780'
};
const AVD_LIST=Object.keys(AVD_COLORS);

let map,markers=[],activeFilter='Alle',currentLat=null,currentLng=null,allData=[];
let topH=0;

async function sbFetch(path,options={}){
  return fetch(`${SB_URL}/rest/v1/${path}`,{
    ...options,
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(options.headers||{})}
  });
}

async function loadData(){
  const r=await sbFetch(`${SB_TABLE}?select=*&order=created_at.desc`);
  if(!r.ok)throw new Error('Feil');
  return r.json();
}

async function saveData(item){
  const r=await sbFetch(SB_TABLE,{method:'POST',body:JSON.stringify({
    adresse:item.adresse,avdeling:item.avdeling,beskrivelse:item.beskrivelse,
    merknader:item.merknader,breddegrad:item.lat,lengdegrad:item.lng,
    opprettet_av:item.navn,bilde_url:item.bilde_url||null
  })});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return(await r.json())[0];
}

async function uploadBilde(file){
  const ext=file.name.split('.').pop();
  const fn=`${Date.now()}.${ext}`;
  const r=await fetch(`${SB_URL}/storage/v1/object/${SB_BUCKET}/${fn}`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type},
    body:file
  });
  if(!r.ok)throw new Error('Bildeopplasting feilet');
  return`${SB_URL}/storage/v1/object/public/${SB_BUCKET}/${fn}`;
}

// Kartverket adresse-API
async function searchKartverket(q){
  const r=await fetch(`https://ws.geonorge.no/adresser/v1/sok?sok=${encodeURIComponent(q)}&kommunenummer=1833&treffPerSide=6&utkoordsys=4258`);
  if(!r.ok)return[];
  const d=await r.json();
  return(d.adresser||[]).map(a=>({
    tekst:`${a.adressenavn} ${a.nummer||''}${a.bokstav||''}`.trim(),
    sted:a.poststed||'',
    lat:a.representasjonspunkt?.lat,
    lng:a.representasjonspunkt?.lon
  })).filter(a=>a.lat&&a.lng);
}

function setMapTop(){
  const tc=document.getElementById('top-controls');
  const h=tc.offsetHeight;
  const mapEl=document.getElementById('map');
  mapEl.style.top=(56+h)+'px';
  if(map)map.invalidateSize();
}

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([66.3126,14.1434],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  setMapTop();
  window.addEventListener('resize',setMapTop);
  map.on('click',()=>document.getElementById('search-results').classList.remove('visible'));
}

function makeIcon(color){
  return L.divIcon({
    className:'',
    html:`<div style="width:30px;height:30px;background:${color};border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>`,
    iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-18]
  });
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  allData.forEach(item=>{
    if(activeFilter!=='Alle'&&item.avdeling!==activeFilter)return;
    if(!item.breddegrad||!item.lengdegrad)return;
    const color=AVD_COLORS[item.avdeling]||'#888';
    const m=L.marker([item.breddegrad,item.lengdegrad],{icon:makeIcon(color)}).addTo(map);
    const dato=new Date(item.created_at).toLocaleDateString('no');
    m.bindPopup(`<div>
      ${item.bilde_url?`<img src="${item.bilde_url}" class="popup-img" onclick="openFullscreen('${item.bilde_url}')" onerror="this.style.display='none'"/>`:''} 
      <div class="popup-body">
        <div class="popup-addr">${item.adresse}</div>
        <div class="popup-field">
          <div class="popup-field-label">Beskrivelse</div>
          <div class="popup-field-val">${item.beskrivelse}</div>
        </div>
        ${item.merknader?`<div class="popup-field">
          <div class="popup-field-label">Merknad</div>
          <div class="popup-field-val">${item.merknader}</div>
        </div>`:''} 
        <div class="popup-footer">
          <div class="popup-footer-top">
            <div class="popup-avd-badge" style="background:${color}22;color:${color}">${item.avdeling}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;"><span style="font-size:12px;color:var(--gray-700);font-weight:500;">${item.opprettet_av||''}</span><span style="font-size:11px;color:var(--gray-300);">·</span><span style="font-size:11px;color:var(--gray-300);">${dato}</span></div>
        </div>
      </div>
    </div>`,{maxWidth:255});
    markers.push(m);
  });
}

function renderFilters(){
  const row=document.getElementById('filter-row');
  row.innerHTML='';
  const all=document.createElement('button');
  all.className='fchip'+(activeFilter==='Alle'?' active':'');
  if(activeFilter==='Alle')all.style.cssText='background:#1a56a0;color:#fff;border-color:#1a56a0;';
  all.textContent='Alle';
  all.onclick=()=>{activeFilter='Alle';renderFilters();renderMarkers();};
  row.appendChild(all);
  AVD_LIST.forEach(avd=>{
    const color=AVD_COLORS[avd];
    const c=document.createElement('button');
    c.className='fchip'+(activeFilter===avd?' active':'');
    if(activeFilter===avd)c.style.cssText=`background:${color};color:#fff;border-color:${color};`;
    c.innerHTML=`<span class="fchip-dot" style="background:${color}"></span>${avd}`;
    c.onclick=()=>{activeFilter=avd;renderFilters();renderMarkers();};
    row.appendChild(c);
  });
}

function updateCount(){document.getElementById('count-badge').textContent=allData.length+' registrert';}

function setView(v){
  document.getElementById('nav-kart').classList.toggle('active',v==='kart');
  document.getElementById('nav-liste').classList.toggle('active',v==='liste');
  document.getElementById('liste-view').style.display=v==='liste'?'block':'none';
  document.getElementById('top-controls').style.display=v==='kart'?'block':'none';
  document.getElementById('map').style.display=v==='kart'?'block':'none';
  if(v==='liste'){
    document.getElementById('liste-view').style.top='56px';
    document.getElementById('liste-search-input').value='';
    renderListe(allData);
  }
  if(v==='kart')setTimeout(()=>{setMapTop();map.invalidateSize();},100);
}

function renderListe(data){
  const c=document.getElementById('liste-content');
  if(!data.length){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--gray-500);font-size:14px;">Ingen nøkkelbokser funnet</div>';return;}
  c.innerHTML=data.map(item=>{
    const color=AVD_COLORS[item.avdeling]||'#888';
    const dato=new Date(item.created_at).toLocaleDateString('no');
    return`<div style="background:#fff;border-radius:10px;margin-bottom:10px;border:1px solid var(--gray-100);overflow:hidden;">
      ${item.bilde_url?`<img src="${item.bilde_url}" style="width:100%;height:80px;object-fit:cover;display:block;" onerror="this.style.display='none'"/>`:''}
      <div style="padding:10px 12px 12px;">
        <div style="font-weight:600;font-size:15px;margin-bottom:10px;">${item.adresse}</div>
        <div style="margin-bottom:8px;">
          <div style="font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;">Beskrivelse</div>
          <div style="font-size:13px;color:var(--gray-700);line-height:1.4;">${item.beskrivelse}</div>
        </div>
        ${item.merknader?`<div style="margin-bottom:8px;">
          <div style="font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;">Merknad</div>
          <div style="font-size:13px;color:var(--gray-700);">${item.merknader}</div>
        </div>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${color}22;color:${color}">${item.avdeling}</span>
          <span style="font-size:11px;color:var(--gray-300);">${item.opprettet_av||''} · ${dato}</span>
        </div>
        <button onclick="flyTo(${item.breddegrad},${item.lengdegrad})" style="width:100%;padding:8px;background:var(--blue-light);color:var(--blue);border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);">Vis på kart</button>
      </div>
    </div>`;
  }).join('');
}

function filterListe(q){
  if(!q.trim()){renderListe(allData);return;}
  renderListe(allData.filter(d=>
    (d.adresse||'').toLowerCase().includes(q.toLowerCase())||
    (d.avdeling||'').toLowerCase().includes(q.toLowerCase())||
    (d.beskrivelse||'').toLowerCase().includes(q.toLowerCase())
  ));
}

function flyTo(lat,lng){
  setView('kart');
  setTimeout(()=>{if(lat&&lng)map.flyTo([lat,lng],17,{duration:1});},150);
}

// KART-SØK
const searchInput=document.getElementById('search-input');
const searchResults=document.getElementById('search-results');
const searchClear=document.getElementById('search-clear');
let searchTimeout;

searchInput.addEventListener('input',function(){
  clearTimeout(searchTimeout);
  const val=this.value.trim();
  searchClear.classList.toggle('visible',val.length>0);
  if(val.length<2){searchResults.classList.remove('visible');return;}
  searchTimeout=setTimeout(()=>doMapSearch(val),300);
});
searchInput.addEventListener('blur',()=>setTimeout(()=>searchResults.classList.remove('visible'),200));

function clearSearch(){
  searchInput.value='';
  searchClear.classList.remove('visible');
  searchResults.classList.remove('visible');
}

async function doMapSearch(q){
  const local=allData.filter(d=>(d.adresse||'').toLowerCase().includes(q.toLowerCase()));
  let html=local.slice(0,3).map(item=>{
    const color=AVD_COLORS[item.avdeling]||'#888';
    return`<div class="sri" onclick="flyTo(${item.breddegrad},${item.lengdegrad});searchResults.classList.remove('visible');searchInput.value='${(item.adresse||'').replace(/'/g,"\\'")}';searchClear.classList.add('visible')">
      <div class="sri-icon" style="background:${color}22;">
        <svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" style="width:13px;height:13px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div><div class="sri-addr">${item.adresse}</div><div class="sri-sub">${item.avdeling} · Nøkkelboks</div></div>
    </div>`;
  }).join('');
  try{
    const places=await searchKartverket(q);
    places.forEach(p=>{
      html+=`<div class="sri" onclick="map.flyTo([${p.lat},${p.lng}],17);searchResults.classList.remove('visible');searchInput.value='${p.tekst.replace(/'/g,"\\'")}';searchClear.classList.add('visible')">
        <div class="sri-icon" style="background:var(--gray-100);">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="2" style="width:13px;height:13px;"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 11.5 7.74 12.07a1 1 0 0 0 1.27 0C13.9 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/></svg>
        </div>
        <div><div class="sri-addr">${p.tekst}</div><div class="sri-sub">${p.sted}</div></div>
      </div>`;
    });
  }catch{}
  if(!html)html='<div class="sri" style="color:var(--gray-500);cursor:default;">Ingen treff</div>';
  searchResults.innerHTML=html;
  searchResults.classList.add('visible');
}

// ADRESSE AUTOCOMPLETE I SKJEMA
let acTimeout;
async function adresseAC(q){
  const list=document.getElementById('ac-list');
  const sel=document.getElementById('addr-selected');
  currentLat=null;currentLng=null;
  sel.classList.remove('visible');
  if(q.length<3){list.classList.remove('visible');return;}
  clearTimeout(acTimeout);
  acTimeout=setTimeout(async()=>{
    try{
      const places=await searchKartverket(q);
      if(!places.length){list.classList.remove('visible');return;}
      list.innerHTML=places.map(p=>`
        <div class="ac-item" onclick="velgAdresse('${p.tekst.replace(/'/g,"\\'")}',${p.lat},${p.lng})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 11.5 7.74 12.07a1 1 0 0 0 1.27 0C13.9 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/></svg>
          <div><div class="ac-main">${p.tekst}</div><div class="ac-sub">${p.sted}</div></div>
        </div>`).join('');
      list.classList.add('visible');
    }catch(e){console.error(e);}
  },300);
}

function velgAdresse(navn,lat,lng){
  document.getElementById('f-adresse').value=navn;
  currentLat=parseFloat(lat);
  currentLng=parseFloat(lng);
  document.getElementById('ac-list').classList.remove('visible');
  document.getElementById('addr-selected').classList.add('visible');
}

function previewBilde(input){
  const file=input.files[0];
  if(!file)return;
  const img=document.getElementById('bilde-preview-img');
  img.src=URL.createObjectURL(file);
  img.style.display='block';
  document.getElementById('bilde-placeholder').style.display='none';
}

function openModal(){document.getElementById('modal-overlay').classList.add('visible');}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('visible');
  ['f-navn','f-adresse','f-beskrivelse','f-merknader'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-avdeling').value='';
  document.getElementById('f-bilde').value='';
  document.getElementById('bilde-preview-img').style.display='none';
  document.getElementById('bilde-placeholder').style.display='block';
  document.getElementById('ac-list').classList.remove('visible');
  document.getElementById('addr-selected').classList.remove('visible');
  currentLat=null;currentLng=null;
}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

async function useGPS(){
  if(!navigator.geolocation){showToast('GPS ikke tilgjengelig');return;}
  showToast('Henter din posisjon...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    currentLat=pos.coords.latitude;
    currentLng=pos.coords.longitude;
    try{
      const r=await fetch(`https://ws.geonorge.no/adresser/v1/punktsok?lat=${currentLat}&lon=${currentLng}&radius=50&utkoordsys=4258`);
      const d=await r.json();
      if(d.adresser&&d.adresser.length>0){
        const a=d.adresser[0];
        const addr=`${a.adressenavn} ${a.nummer||''}${a.bokstav||''}`.trim();
        document.getElementById('f-adresse').value=addr;
      } else {
        document.getElementById('f-adresse').value=`${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
      }
      document.getElementById('addr-selected').classList.add('visible');
    }catch{
      document.getElementById('f-adresse').value=`${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
      document.getElementById('addr-selected').classList.add('visible');
    }
    showToast('Posisjon hentet');
  },()=>showToast('Kunne ikke hente posisjon'));
}

async function submitForm(){
  const navn=document.getElementById('f-navn').value.trim();
  const adresse=document.getElementById('f-adresse').value.trim();
  const avdeling=document.getElementById('f-avdeling').value;
  const beskrivelse=document.getElementById('f-beskrivelse').value.trim();
  const merknader=document.getElementById('f-merknader').value.trim();
  const bildeFile=document.getElementById('f-bilde').files[0];
  if(!navn||!adresse||!avdeling||!beskrivelse){showToast('Fyll ut alle obligatoriske felt');return;}
  if(!currentLat||!currentLng){showToast('Velg en adresse fra forslagslisten');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Registrerer...';
  let bilde_url=null;
  if(bildeFile){
    try{bilde_url=await uploadBilde(bildeFile);}
    catch(e){console.error(e);showToast('Bilde feilet, fortsetter uten');}
  }
  try{
    const saved=await saveData({navn,adresse,avdeling,beskrivelse,merknader,lat:currentLat,lng:currentLng,bilde_url});
    allData.unshift(saved);
    renderMarkers();updateCount();
    const lat=currentLat,lng=currentLng;
    closeModal();
    map.flyTo([lat,lng],17,{duration:1});
    showToast('Nøkkelboks registrert');
  }catch(e){
    showToast('Kunne ikke lagre – prøv igjen');
    console.error(e);
  }
  btn.disabled=false;btn.textContent='Registrer nøkkelboks';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('visible');
  setTimeout(()=>t.classList.remove('visible'),3000);
}


function openFullscreen(src){
  document.getElementById('fullscreen-img').src=src;
  document.getElementById('img-fullscreen').classList.add('visible');
}
function closeFullscreen(){
  document.getElementById('img-fullscreen').classList.remove('visible');
}

async function init(){
  initMap();
  renderFilters();
  try{allData=await loadData();}
  catch(e){showToast('Kunne ikke laste data');console.error(e);allData=[];}
  document.getElementById('loading').style.display='none';
  renderMarkers();
  updateCount();
  setTimeout(setMapTop,50);
  setTimeout(setMapTop,300);
  setTimeout(setMapTop,800);
}

init();
</script>

<div class="img-fullscreen" id="img-fullscreen" onclick="closeFullscreen()">
  <img id="fullscreen-img" src=""/>
</div>
